# default i3 tiling mode:
workspace_layout default
focus_follows_mouse no
focus_wrapping no

##########################################
# configuration for workspace behaviour: #
##########################################
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"

################################
#     Assigned Workspace       #
################################

# (W-1) Terminals
assign [class="(?i)alacritty"] $ws1
assign [class="(?i)wezterm"] $ws1
assign [class="(?i)ghostty"] $ws1
assign [class="(?i)kitty"] $ws1
assign [class="(?i)foot"] $ws1

# (W-2) Browsers
assign [class="(?i)firefox"] $ws2
assign [class="(?i)brave"] $ws2
assign [class="(?i)librewolf"] $ws2
assign [class="(?i)zen"] $ws2

# (W-3) Devtools 1
assign [class="(?i)postman"] $ws3
assign [class="(?i)mongodb"] $ws3
assign [class="(?i)code-oss"] $ws3
assign [class="(?i)code"] $ws3

# (W-4) Devtools 2
assign [class="(?i)jetbrains-idea-ce"] $ws4

# (W-5) File Manager / Media
assign [class="(?i)pcmanfm"] $ws5
assign [class="(?i)mpv"] $ws5
assign [class="(?i)feh"] $ws5

# (W-6) Messaging
assign [class="(?i)telegram"] $ws6
assign [class="(?i)discord"] $ws6
assign [class="(?i)slack"] $ws6

# (W-7) Graphics / Spotify
assign [class="(?i)gimp"] $ws7
assign [class="(?i)inkscape"] $ws7
assign [class="(?i)spotify"] $ws7

# (W-8) Office / Docs
assign [class="(?i)office"] $ws8
assign [class="(?i)zathura"] $ws8
assign [class="(?i)onlyoffice"] $ws8

# (W-9) System / Misc
assign [class="(?i)gnome-disks"] $ws9
assign [class="(?i)blueman-manager"] $ws9
assign [class="(?i)obs"] $ws9
assign [class="(?i)pavucontrol"] $ws9
assign [class="(?i)nwg-look"] $ws9
